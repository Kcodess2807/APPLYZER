name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: "pip"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio flake8 mypy
        
    - name: Run Flake8
      run: flake8 app tests --count --show-source --statistics
      
    - name: Run Mypy
      run: mypy app
      
    - name: Run Pytest
      env:
        # Provide dummy env vars so settings validation doesn't crash CI
        DATABASE_URL: sqlite:///./test.db
        SECRET_KEY: test-ci-secret-key-that-is-valid-for-tests
        DEBUG: true
      run: pytest tests/ -v
